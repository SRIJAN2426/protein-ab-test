<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Egg Game</title>

<link rel="stylesheet" href="style.css">

<style>

body{
text-align:center;
padding:60px;
}

.egg-grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:25px;
justify-content:center;
margin-top:40px;
}

.egg{
font-size:50px;
cursor:pointer;
transition:0.2s;
}

.egg:hover{
transform:scale(1.2);
}

</style>

</head>


<body>

<h1>Lucky Egg</h1>

<p>Crack an egg. You have 3 chances.</p>

<div class="egg-grid">

<div class="egg">🥚</div>
<div class="egg">🥚</div>
<div class="egg">🥚</div>
<div class="egg">🥚</div>
<div class="egg">🥚</div>
<div class="egg">🥚</div>

</div>

<p id="chancesText">Chances left: 3</p>

<script>

let eggs=document.querySelectorAll(".egg")

let chances=3

let username=localStorage.getItem("username")

function updateLeaderboard(discount){

let board=JSON.parse(localStorage.getItem("leaderboard")||"[]")

let existing=board.find(p=>p.name===username)

if(existing){

if(discount>existing.discount){
existing.discount=discount
}

}else{

board.push({
name:username,
discount:discount
})

}

localStorage.setItem("leaderboard",JSON.stringify(board))

}


eggs.forEach(egg=>{

egg.onclick=function(){

if(chances<=0) return

chances--

document.getElementById("chancesText").innerText="Chances left: "+chances

let win=Math.random()<0.4

if(win){

egg.innerHTML="🥚💪"

let discount=12.5

alert("You found the protein! "+discount+"% discount!")

localStorage.setItem("discount",discount)

updateLeaderboard(discount)

setTimeout(()=>{

window.location.href="index.html"

},1500)

}else{

egg.innerHTML="🥚❌"

}

}

})

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Lucky Egg</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#111;
color:white;
text-align:center;
}

#eggArea{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:400px;
margin:auto;
margin-top:40px;
}

.egg{
background:white;
color:black;
padding:30px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Lucky Egg</h1>

<p>3 chances to crack 6 eggs</p>

<div id="eggArea"></div>

<script>

if(localStorage.getItem("game_played")==="true"){

alert("You already played")

window.location.href="index.html"

}

let attempts=3
let wins=0

let winners=[1,4]

function createEggs(){

let area=document.getElementById("eggArea")

for(let i=0;i<6;i++){

let egg=document.createElement("div")

egg.className="egg"

egg.innerText="🥚"

egg.onclick=function(){

if(attempts<=0)return

attempts--

if(winners.includes(i)){

egg.innerHTML='<img src="protein.png" width="60">'

wins++

}else{

egg.innerText="Empty"

}

if(attempts===0){

finish()

}

}

area.appendChild(egg)

}

}

function finish(){

localStorage.setItem("game_played","true")

let discount=wins*12.5

localStorage.setItem("game_discount_pct",discount)

let name=localStorage.getItem("ff_name")

let board=JSON.parse(localStorage.getItem("leaderboard")||"[]")

board.push({name:name,wins:wins,discount:discount})

localStorage.setItem("leaderboard",JSON.stringify(board))

alert("You won "+discount+"% discount")

window.location.href="index.html"

}

createEggs()

</script>

</body>

</html>

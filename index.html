<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FuelForge Experiment</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">FUELFORGE</div>

<nav class="nav">

<button id="shopBtn">Shop</button>

<div class="icons">

<button id="accountBtn"><i class="fa-regular fa-user"></i></button>

<button id="cartBtn">
<i class="fa-solid fa-bag-shopping"></i>
<span id="cartCount">0</span>
</button>

</div>

</nav>

</header>


<section class="product">

<div class="product-left">

<h1>Chocolate Fermented Protein</h1>

<div class="price-row">

<span class="new-price" id="price">₹2249</span>
<span class="old-price">₹2899</span>
<span class="discount" id="discount">22% OFF</span>

</div>

<p class="desc">
Clean fermented protein engineered for digestion and recovery.
</p>

<div class="action-area">

<button id="addToCartBtn" class="cta">
Add To Cart
</button>

<button id="playGameBtn" class="cta secondary hidden">
Play Lucky Egg Game
</button>

</div>

</div>

<div class="product-right">
<img src="protein.png" class="product-image">
</div>

</section>


<section class="leaderboard-section">

<h2>🏆 Top Players</h2>

<div id="leaderboardList" class="leaderboard"></div>

</section>


<div id="usernameModal" class="modal hidden">

<div class="modal-inner">

<h3>Welcome</h3>

<p>Enter your display name</p>

<input id="usernameInput">

<button id="saveNameBtn">Save</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

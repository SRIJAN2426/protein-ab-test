<!DOCTYPE html>
<html>

<head>

<title>Experiment Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2 style="text-align:center">A/B Experiment Analytics</h2>

<div style="max-width:600px;margin:auto">

<p id="visit"></p>
<p id="conv"></p>
<p id="winner"></p>

</div>

<script>

let v=JSON.parse(localStorage.getItem("visits")||'{"A":0,"B":0}')
let c=JSON.parse(localStorage.getItem("conv")||'{"A":0,"B":0}')

document.getElementById("visit").innerText=
"Visits: A "+v.A+" | B "+v.B

document.getElementById("conv").innerText=
"Conversions: A "+c.A+" | B "+c.B

let rateA=c.A/v.A
let rateB=c.B/v.B

let winner=rateA>rateB?"Variant A":"Variant B"

document.getElementById("winner").innerText=
"Current Winner: "+winner

</script>

</body>
</html>
